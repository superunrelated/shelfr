<!doctype html>
<html lang="en">

    <meta charset="utf-8" />
    <title>Shelfr</title>
    <base href="/shelfr/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-tu3joW0+YWlzKKcSfHhfBfgx2YNigKMljLip+kNyxtU='; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self';" />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#1c1e2a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/shelfr/logo.svg" />

    <link rel="manifest" href="/shelfr/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // GitHub Pages SPA redirect handler
      (function () {
        var redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect) {
          var decoded = decodeURIComponent(redirect);
          if (decoded.startsWith('/') && !decoded.startsWith('//') && decoded.indexOf('://') === -1) {
            history.replaceState(null, '', decoded);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
