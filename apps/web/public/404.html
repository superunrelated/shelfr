<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect all 404s to index.html with the path preserved
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/shelfr/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
</html>
