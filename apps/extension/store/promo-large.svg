<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <rect width="1280" height="800" fill="#1c1e2a"/>

  <!-- Logo -->
  <text x="640" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" letter-spacing="-0.025em">
    <tspan fill="#ffffff">shelf</tspan><tspan fill="#fbbf24">r</tspan>
  </text>

  <!-- Tagline -->
  <text x="640" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a3a3a3" letter-spacing="0.01em">
    Research products. Make better decisions.
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a3a3a3">
    <rect x="310" y="460" width="130" height="36" rx="18" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="375" y="483" text-anchor="middle">Save products</text>

    <rect x="460" y="460" width="110" height="36" rx="18" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="515" y="483" text-anchor="middle">Compare</text>

    <rect x="590" y="460" width="130" height="36" rx="18" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="655" y="483" text-anchor="middle">Track prices</text>

    <rect x="740" y="460" width="100" height="36" rx="18" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="790" y="483" text-anchor="middle">Decide</text>

    <rect x="860" y="460" width="120" height="36" rx="18" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <text x="920" y="483" text-anchor="middle" fill="#f59e0b">Buy smart</text>
  </g>
</svg>
