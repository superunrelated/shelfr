<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <rect width="1280" height="800" fill="#fafafa"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="800" fill="#1c1e2a"/>
  <text x="24" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" letter-spacing="-0.025em">
    <tspan fill="#ffffff">shelf</tspan><tspan fill="#fbbf24">r</tspan>
  </text>
  <text x="24" y="86" font-family="system-ui, sans-serif" font-size="10" fill="#737373" letter-spacing="0.15em">COLLECTIONS</text>

  <!-- Active collection -->
  <rect x="0" y="100" width="240" height="44" fill="rgba(255,255,255,0.08)"/>
  <circle cx="32" cy="122" r="4" fill="#5b8db8"/>
  <text x="48" y="127" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">Living Room Lighting</text>

  <circle cx="32" cy="166" r="4" fill="#4f9a7e"/>
  <text x="48" y="171" font-family="system-ui, sans-serif" font-size="13" fill="#737373">Kitchen Appliances</text>

  <circle cx="32" cy="210" r="4" fill="#c4883d"/>
  <text x="48" y="215" font-family="system-ui, sans-serif" font-size="13" fill="#737373">Office Desk Setup</text>

  <!-- Main content area -->
  <!-- Topbar -->
  <rect x="240" y="0" width="1040" height="56" fill="#ffffff"/>
  <line x1="240" y1="56" x2="1280" y2="56" stroke="#e5e5e5" stroke-width="1"/>
  <text x="272" y="35" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1c1e2a" font-weight="600">Living Room Lighting</text>

  <!-- Product grid - 4 cards -->
  <g transform="translate(272, 80)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="230" height="280" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
    <rect x="0" y="0" width="230" height="170" rx="6" fill="#f0f0f0"/>
    <rect x="0" y="164" width="230" height="6" fill="#ffffff"/>
    <text x="16" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#a3a3a3" letter-spacing="0.05em">LUMENS.COM</text>
    <text x="16" y="216" font-family="Georgia, serif" font-size="14" fill="#1c1e2a" font-weight="500">Rayon de Lumiere</text>
    <text x="16" y="250" font-family="system-ui, sans-serif" font-size="16" fill="#1c1e2a" font-weight="600">$253</text>
    <rect x="56" y="238" width="72" height="20" rx="10" fill="#dbeafe"/>
    <text x="92" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="500">Shortlisted</text>

    <!-- Card 2 -->
    <rect x="250" y="0" width="230" height="280" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
    <rect x="250" y="0" width="230" height="170" rx="6" fill="#e8e8e8"/>
    <rect x="250" y="164" width="230" height="6" fill="#ffffff"/>
    <text x="266" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#a3a3a3" letter-spacing="0.05em">WEST ELM</text>
    <text x="266" y="216" font-family="Georgia, serif" font-size="14" fill="#1c1e2a" font-weight="500">Globe Pendant Brass</text>
    <text x="266" y="250" font-family="system-ui, sans-serif" font-size="16" fill="#1c1e2a" font-weight="600">$189</text>
    <rect x="306" y="238" width="54" height="20" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <text x="333" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" font-weight="500">Winner</text>

    <!-- Card 3 -->
    <rect x="500" y="0" width="230" height="280" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
    <rect x="500" y="0" width="230" height="170" rx="6" fill="#f5f5f5"/>
    <rect x="500" y="164" width="230" height="6" fill="#ffffff"/>
    <text x="516" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#a3a3a3" letter-spacing="0.05em">FREEDOM</text>
    <text x="516" y="216" font-family="Georgia, serif" font-size="14" fill="#1c1e2a" font-weight="500">Arc Floor Lamp</text>
    <text x="516" y="250" font-family="system-ui, sans-serif" font-size="16" fill="#1c1e2a" font-weight="600">$420</text>

    <!-- Card 4 -->
    <rect x="750" y="0" width="230" height="280" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
    <rect x="750" y="0" width="230" height="170" rx="6" fill="#eeeeee"/>
    <rect x="750" y="164" width="230" height="6" fill="#ffffff"/>
    <text x="766" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#a3a3a3" letter-spacing="0.05em">IKEA</text>
    <text x="766" y="216" font-family="Georgia, serif" font-size="14" fill="#1c1e2a" font-weight="500">SINNERLIG Pendant</text>
    <text x="766" y="250" font-family="system-ui, sans-serif" font-size="16" fill="#1c1e2a" font-weight="600">$79</text>
    <rect x="806" y="238" width="90" height="20" rx="10" fill="#d1fae5"/>
    <text x="851" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#059669" font-weight="500">Purchased</text>
  </g>

  <!-- Bottom URL bar hint -->
  <rect x="240" y="756" width="1040" height="44" fill="#ffffff"/>
  <line x1="240" y1="756" x2="1280" y2="756" stroke="#e5e5e5" stroke-width="1"/>
  <text x="280" y="783" font-family="system-ui, sans-serif" font-size="12" fill="#a3a3a3">Paste a product URL to add...</text>
</svg>
