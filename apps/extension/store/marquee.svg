<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <rect width="1400" height="560" fill="#1c1e2a"/>

  <!-- Logo -->
  <text x="700" y="230" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="80" letter-spacing="-0.025em">
    <tspan fill="#ffffff">shelf</tspan><tspan fill="#fbbf24">r</tspan>
  </text>

  <!-- Tagline -->
  <text x="700" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#a3a3a3" letter-spacing="0.01em">
    Research products. Make better decisions.
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a3a3a3">
    <rect x="355" y="340" width="120" height="34" rx="17" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="415" y="362" text-anchor="middle">Save products</text>

    <rect x="495" y="340" width="100" height="34" rx="17" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="545" y="362" text-anchor="middle">Compare</text>

    <rect x="615" y="340" width="120" height="34" rx="17" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="675" y="362" text-anchor="middle">Track prices</text>

    <rect x="755" y="340" width="90" height="34" rx="17" fill="none" stroke="#404040" stroke-width="1"/>
    <text x="800" y="362" text-anchor="middle">Decide</text>

    <rect x="865" y="340" width="110" height="34" rx="17" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <text x="920" y="362" text-anchor="middle" fill="#f59e0b">Buy smart</text>
  </g>
</svg>
